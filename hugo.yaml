baseURL: "https://ryoulegacy.github.io/"
languageCode: "en-us"
title: "Ryou"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 5

outputs:
  home:
    - HTML
    - RSS
    - JSON

# 1. ADDED 'tag: tags' HERE
taxonomies:
  # category: categories
  tag: tags

menu:
  main:
    - name: Post
      url: /posts/
      weight: 1
    - name: About
      url: /about/
      weight: 3
    # 2. ADDED TAGS MENU ITEM HERE
    - name: Tag
      url: /tags/
      weight: 

params:
  env: production
  author: "Trần Anh Thi"

  math: true

  # UseHugoToc: false
  # ShowToc: true

  ShowToc: true
  TocOpen: false  # doesn't matter anymore but set it anyway

  ShowRelatedPosts: true
  related:
    includeNewer: true
    threshold: 80
    toLower: false

  defaultTheme: dark
  disableThemeToggle: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  ShowAllPagesInArchive: true
  ShowRssButtonInSectionTermList: false

  # These are already correctly set!
  ShowTags: true
  ShowPostMeta: true
  ShowCategories: false

  profileMode:
    enabled: True
    title: "ryou"
    subtitle: "A Rookie Reverse Engineer"
    imageUrl: "imgs/cattt.png"
    imageTitle: "ryou"
    imageWidth: 150
    imageHeight: 150
    buttons:
      # - name: Posts
      #   url: /posts/
      - name: View All Post
        url: /posts/

  socialIcons:
    - name: github
      url: "https://github.com/RyouLegacy"

  fuseOpts:
    isCaseSensitive: false
    threshold: 0.4
    keys: ["title", "permalink", "summary", "content"]

markup:
  highlight:
    noClasses: false
    style: github
    lineNos: true
  tableOfContents:
    startLevel: 2
    endLevel: 4
  # tableOfContents:
  #   startLevel: 1
  #   endLevel: 4
  #   ordered: false